<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>InfiniteDream</title>
<style>
:root{--bg:#0d1117;--bg-1:#161b22;--bg-2:#21262d;--bg-3:#30363d;--border:#30363d;--text:#e6edf3;--text-2:#8b949e;--text-3:#6e7681;--accent:#58a6ff;--accent-2:#1f6feb;--green:#3fb950;--yellow:#d29922;--red:#f85149;--nav-w:220px;--header-h:56px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;display:flex}
.sidebar{width:var(--nav-w);min-width:var(--nav-w);background:var(--bg-1);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;user-select:none}
.sidebar-brand{padding:20px 16px 12px;border-bottom:1px solid var(--border)}.sidebar-brand h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}.sidebar-brand h1 em{color:var(--accent);font-style:normal}.sidebar-brand .tagline{font-size:11px;color:var(--text-3);margin-top:2px}
.nav-items{flex:1;padding:12px 8px}.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--text-2);transition:all .15s;margin-bottom:2px}.nav-item:hover{background:var(--bg-2);color:var(--text)}.nav-item.active{background:var(--accent-2);color:#fff}.nav-item .icon{font-size:18px;width:24px;text-align:center}.nav-item .badge{margin-left:auto;background:var(--bg-3);border-radius:10px;padding:1px 8px;font-size:11px;color:var(--text-3)}.nav-item.active .badge{background:rgba(255,255,255,.2);color:rgba(255,255,255,.8)}
.nav-sep{height:1px;background:var(--border);margin:8px 12px}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3)}.cfg-st{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:12px}.cfg-dot{width:8px;height:8px;border-radius:50%;background:var(--red)}.cfg-dot.ok{background:var(--green)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}.header{height:var(--header-h);min-height:var(--header-h);background:var(--bg-1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px}.header-title{font-size:16px;font-weight:600}.header-actions{margin-left:auto;display:flex;gap:8px}.content{flex:1;overflow-y:auto;padding:24px}
.card{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}.card-title{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
textarea,input[type="text"],input[type="password"],input[type="url"],input[type="number"],select{width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}textarea{resize:vertical;min-height:120px}input:focus,textarea:focus,select:focus{border-color:var(--accent)}
.form-group{margin-bottom:16px}.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:6px}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent-2);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}.btn:hover{background:var(--accent)}.btn:disabled{opacity:.4;cursor:not-allowed}.btn-sm{padding:6px 14px;font-size:13px}.btn-lg{padding:12px 28px;font-size:15px}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-2)}.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:transparent}.btn-green{background:#238636}.btn-green:hover{background:#2ea043}
.tag{display:inline-block;background:var(--bg-2);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:12px;margin:2px}.tag.accent{border-color:var(--accent);color:var(--accent)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-3)}.empty-state .e-icon{font-size:48px;margin-bottom:16px}.empty-state .e-title{font-size:18px;color:var(--text-2);margin-bottom:8px}.empty-state .e-desc{font-size:14px;margin-bottom:24px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;right:20px;background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:14px;z-index:9999;animation:slideIn .3s ease;max-width:400px}.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.conn-st{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:6px;background:var(--bg-2)}.conn-st.ok{color:var(--green)}.conn-st.fail{color:var(--red)}
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}.project-card{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all .15s}.project-card:hover{border-color:var(--accent);transform:translateY(-2px)}.project-card .p-name{font-size:16px;font-weight:600;margin-bottom:8px}.project-card .p-meta{font-size:12px;color:var(--text-2);display:flex;gap:12px;flex-wrap:wrap}.project-card .p-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:2px 8px;border-radius:4px;background:var(--bg-2);margin-top:10px}
.style-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}.style-card{background:var(--bg-2);border:2px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s;text-align:center}.style-card:hover{border-color:var(--text-3)}.style-card.selected{border-color:var(--accent);background:rgba(31,111,235,.1)}.style-card .s-icon{font-size:28px;margin-bottom:8px}.style-card .s-name{font-size:14px;font-weight:600}.style-card .s-desc{font-size:11px;color:var(--text-3);margin-top:4px}
.detail-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}.detail-tab{padding:10px 20px;font-size:14px;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}.detail-tab:hover{color:var(--text)}.detail-tab.active{color:var(--accent);border-bottom-color:var(--accent)}.d-panel{display:none}.d-panel.active{display:block}
.seg-item{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;position:relative}.seg-item .seq-badge{position:absolute;top:12px;right:12px;background:var(--accent-2);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}.seg-item .seg-meta{font-size:13px;color:var(--text-2);margin-bottom:8px}.seg-item .seg-prompt{font-size:13px;white-space:pre-wrap;word-break:break-word;background:var(--bg);border-radius:6px;padding:12px;margin-top:10px;font-family:'SF Mono','Fira Code',Menlo,monospace;line-height:1.6;border:1px solid var(--border)}
.char-item,.scene-item{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}.char-item .c-name,.scene-item .sc-name{font-size:15px;font-weight:600;margin-bottom:6px}.char-item .c-desc,.scene-item .sc-desc{font-size:13px;color:var(--text-2);margin-bottom:8px}
.stats-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}.stat-card{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:16px 20px;min-width:130px}.stat-card .num{font-size:28px;font-weight:700;color:var(--accent);line-height:1}.stat-card .label{font-size:12px;color:var(--text-3);margin-top:4px}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--text-3)}
@media(max-width:800px){.sidebar{width:56px;min-width:56px}.sidebar-brand h1 em,.sidebar-brand .tagline,.nav-item span:not(.icon),.nav-item .badge,.sidebar-footer span{display:none}.sidebar-brand{padding:16px 8px}.sidebar-brand h1{justify-content:center}.nav-item{justify-content:center;padding:12px 8px}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="sidebar">
<div class="sidebar-brand"><h1>🎬 <em>InfiniteDream</em></h1><div class="tagline">AI 视频生产引擎 v0.1</div></div>
<div class="nav-items">
<div class="nav-item" data-page="home" onclick="navigate('home')"><span class="icon">🏠</span><span>首页</span><span class="badge" id="badge-count">0</span></div>
<div class="nav-item" data-page="create" onclick="navigate('create')"><span class="icon">✨</span><span>新建项目</span></div>
<div class="nav-sep"></div>
<div class="nav-item" data-page="settings" onclick="navigate('settings')"><span class="icon">⚙️</span><span>设置</span></div>
</div>
<div class="sidebar-footer">
<div class="cfg-st"><div class="cfg-dot" id="llm-dot"></div><span id="llm-st">LLM 未配置</span></div>
<div class="cfg-st"><div class="cfg-dot" id="vid-dot"></div><span id="vid-st">视频 AI 未配置</span></div>
</div>
</nav>
<div class="main">
<header class="header"><div class="header-title" id="h-title">首页</div><div class="header-actions" id="h-actions"></div></header>
<div class="content" id="content"></div>
</div>
<script>
var API='http://localhost:8000',currentPage='home',currentProject=null,projects=[],selectedStyle='cinematic',detailTab='overview';
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m,t){t=t||'success';var e=document.createElement('div');e.className='toast '+t;e.textContent=m;document.body.appendChild(e);setTimeout(function(){e.remove()},3500);}
function api(p,o){o=o||{};return fetch(API+p,Object.assign({headers:Object.assign({'Content-Type':'application/json'},o.headers||{})},o)).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t)});return r.json()});}
function loadCfg(){try{return JSON.parse(localStorage.getItem('id_cfg')||'{}')}catch(e){return {}}}
function saveCfg(c){localStorage.setItem('id_cfg',JSON.stringify(c));updCfgSt();}
function updCfgSt(){var c=loadCfg();var a=!!c.llm_api_key,b=!!c.video_api_key;document.getElementById('llm-dot').className='cfg-dot'+(a?' ok':'');document.getElementById('vid-dot').className='cfg-dot'+(b?' ok':'');document.getElementById('llm-st').textContent=a?'LLM \u5df2\u914d\u7f6e':'LLM \u672a\u914d\u7f6e';document.getElementById('vid-st').textContent=b?'\u89c6\u9891 AI \u5df2\u914d\u7f6e':'\u89c6\u9891 AI \u672a\u914d\u7f6e';}
function navigate(pg,data){currentPage=pg;if(data)currentProject=data;document.querySelectorAll('.nav-item').forEach(function(e){e.classList.toggle('active',e.dataset.page===pg)});var t={home:'\u9996\u9875',create:'\u65b0\u5efa\u9879\u76ee',settings:'\u8bbe\u7f6e',detail:'\u9879\u76ee\u8be6\u60c5'};document.getElementById('h-title').textContent=t[pg]||'';document.getElementById('h-actions').innerHTML='';({home:renderHome,create:renderCreate,settings:renderSettings,detail:renderDetail})[pg]();}

function renderSettings(){var c=loadCfg();var h='<div class="card"><div class="card-title">\U0001f916 LLM \u914d\u7f6e</div><div class="form-row"><div class="form-group"><label>Provider</label><select id="s-lp"><option value="openai"'+(c.llm_provider==='openai'?' selected':'')+'>OpenAI</option><option value="anthropic"'+(c.llm_provider==='anthropic'?' selected':'')+'>Anthropic</option><option value="custom"'+(c.llm_provider==='custom'?' selected':'')+'>\u81ea\u5b9a\u4e49</option></select></div><div class="form-group"><label>Model</label><input type="text" id="s-lm" value="'+esc(c.llm_model||'gpt-4o')+'" placeholder="gpt-4o"/></div></div><div class="form-group"><label>API Key</label><input type="password" id="s-lk" value="'+esc(c.llm_api_key||'')+'" placeholder="sk-..."/></div><div class="form-group"><label>Base URL\uff08\u53ef\u9009\uff09</label><input type="url" id="s-lu" value="'+esc(c.llm_base_url||'')+'" placeholder="https://api.openai.com/v1"/></div></div>';h+='<div class="card"><div class="card-title">\U0001f3ac \u89c6\u9891 AI \u914d\u7f6e</div><div class="form-row"><div class="form-group"><label>Provider</label><select id="s-vp"><option value="kling"'+(c.video_provider==='kling'?' selected':'')+'>\u53ef\u7075 (Kling)</option><option value="minimax"'+(c.video_provider==='minimax'?' selected':'')+'>MiniMax</option><option value="runway"'+(c.video_provider==='runway'?' selected':'')+'>Runway</option></select></div><div class="form-group"><label>API Key</label><input type="password" id="s-vk" value="'+esc(c.video_api_key||'')+'" placeholder="\u8f93\u5165 API Key"/></div></div><div class="form-group"><label>Base URL\uff08\u53ef\u9009\uff09</label><input type="url" id="s-vu" value="'+esc(c.video_base_url||'')+'" placeholder="\u7559\u7a7a\u4f7f\u7528\u9ed8\u8ba4\u5730\u5740"/></div></div>';h+='<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap"><button class="btn btn-green btn-lg" onclick="doSave()">\U0001f4be \u4fdd\u5b58\u914d\u7f6e</button><button class="btn btn-outline" onclick="doTest()">\U0001f517 \u6d4b\u8bd5\u8fde\u63a5</button><span id="conn-st"></span></div>';document.getElementById('content').innerHTML=h;}
function doSave(){var o={llm_provider:document.getElementById('s-lp').value,llm_model:document.getElementById('s-lm').value,llm_api_key:document.getElementById('s-lk').value,llm_base_url:document.getElementById('s-lu').value,video_provider:document.getElementById('s-vp').value,video_api_key:document.getElementById('s-vk').value,video_base_url:document.getElementById('s-vu').value};saveCfg(o);api('/api/config',{method:'POST',body:JSON.stringify(o)}).then(function(){toast('\u914d\u7f6e\u5df2\u4fdd\u5b58\u5e76\u540c\u6b65\u5230\u540e\u7aef')}).catch(function(){toast('\u914d\u7f6e\u5df2\u672c\u5730\u4fdd\u5b58\uff08\u540e\u7aef\u672a\u8fde\u63a5\uff09','error')});}
function doTest(){var e=document.getElementById('conn-st');e.innerHTML='<span class="spinner"></span> \u6d4b\u8bd5\u4e2d...';api('/health').then(function(){e.innerHTML='<span class="conn-st ok">\u2705 \u540e\u7aef\u8fde\u63a5\u6b63\u5e38</span>'}).catch(function(){e.innerHTML='<span class="conn-st fail">\u274c \u8fde\u63a5\u5931\u8d25</span>'});}

function renderHome(){var ct=document.getElementById('content');ct.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';document.getElementById('h-actions').innerHTML='<button class="btn" onclick="navigate(\'create\')">\u2728 \u65b0\u5efa\u9879\u76ee</button>';api('/api/projects').then(function(d){projects=d}).catch(function(){projects=[]}).then(function(){document.getElementById('badge-count').textContent=projects.length;if(!projects.length){ct.innerHTML='<div class="empty-state"><div class="e-icon">\U0001f3ac</div><div class="e-title">\u8fd8\u6ca1\u6709\u9879\u76ee</div><div class="e-desc">\u521b\u5efa\u4f60\u7684\u7b2c\u4e00\u4e2a AI \u89c6\u9891\u9879\u76ee\uff0c\u4ece\u5267\u672c\u5230\u6210\u7247\u5168\u81ea\u52a8</div><button class="btn btn-lg" onclick="navigate(\'create\')">\u2728 \u65b0\u5efa\u9879\u76ee</button></div>';return}ct.innerHTML='<div class="project-grid">'+projects.map(function(p){return '<div class="project-card" onclick="openProj(\''+esc(p.id)+'\')"><div class="p-name">'+esc(p.name)+'</div><div class="p-meta"><span>\U0001f3ad '+p.characters+' \u89d2\u8272</span><span>\U0001f3de\ufe0f '+p.scenes+' \u573a\u666f</span><span>\U0001f3ac '+p.segments+' \u5206\u6bb5</span>'+(p.style?'<span>\U0001f3a8 '+esc(p.style)+'</span>':'')+'</div><div class="p-badge">'+(p.status==='completed'?'\u2705':'\u23f3')+' \u9636\u6bb5 '+p.stage+'/6</div></div>'}).join('')+'</div>'});}
function openProj(id){api('/api/projects/'+id).then(function(d){navigate('detail',d)}).catch(function(){toast('\u52a0\u8f7d\u5931\u8d25','error')});}

var STYLES=[{id:'cinematic',icon:'\U0001f3a5',name:'\u5199\u5b9e\u7535\u5f71',desc:'\u7535\u5f71\u7ea7\u753b\u8d28\uff0c\u771f\u5b9e\u5149\u5f71'},{id:'sweet_romance',icon:'\U0001f495',name:'\u751c\u5ba0',desc:'\u67d4\u5149\u6696\u8272\uff0c\u6d6a\u6f2b\u552f\u7f8e'},{id:'xianxia',icon:'\U0001f3d4\ufe0f',name:'\u4ed9\u4fa0',desc:'\u5c71\u6c34\u4ed9\u5883\uff0c\u53e4\u98ce\u7279\u6548'},{id:'cyberpunk',icon:'\U0001f303',name:'\u8d5b\u535a\u670b\u514b',desc:'\u9713\u8679\u90fd\u5e02\uff0c\u672a\u6765\u79d1\u6280'},{id:'war',icon:'\u2694\ufe0f',name:'\u6218\u4e89',desc:'\u53f2\u8bd7\u6218\u573a\uff0c\u785d\u70df\u5f25\u6f2b'},{id:'anime',icon:'\U0001f3a8',name:'\u65e5\u7cfb\u52a8\u753b',desc:'\u52a8\u6f2b\u98ce\u683c\uff0c\u9c9c\u660e\u914d\u8272'},{id:'retro_film',icon:'\U0001f4fd\ufe0f',name:'\u590d\u53e4\u80f6\u7247',desc:'\u9897\u7c92\u611f\uff0c\u6000\u65e7\u8272\u8c03'},{id:'documentary',icon:'\U0001f4f9',name:'\u7eaa\u5f55\u7247',desc:'\u81ea\u7136\u771f\u5b9e\uff0c\u51b7\u9759\u53d9\u4e8b'}];
function renderCreate(){var h='<div class="card"><div class="card-title">\U0001f4dd \u5267\u672c\u5185\u5bb9</div><div class="form-group"><textarea id="c-script" rows="10" placeholder="\u5728\u8fd9\u91cc\u8f93\u5165\u4f60\u7684\u5267\u672c...\n\n\u4f8b\u5982\uff1a\n\u7b2c\u4e00\u7ae0\uff1a\u6708\u4e0b\u76f8\u9047\n\u591c\u665a\uff0c\u7af9\u6797\u4e2d\uff0c\u6708\u5149\u5982\u6c34\u3002\n\u6797\u5a49\u513f\u72ec\u81ea\u884c\u8d70\u5728\u7af9\u6797\u5c0f\u8def\u4e0a\uff0c\u767d\u8272\u6c49\u670d\u968f\u98ce\u98d8\u52a8..."></textarea></div><div class="form-row"><div class="form-group"><label>\u9879\u76ee\u540d\u79f0</label><input type="text" id="c-title" value="\u6211\u7684\u89c6\u9891" placeholder="\u9879\u76ee\u540d\u79f0"/></div><div class="form-group"><label>\u76ee\u6807\u65f6\u957f\uff08\u79d2\uff09</label><input type="number" id="c-dur" value="60" min="10" max="600"/></div></div></div>';h+='<div class="card"><div class="card-title">\U0001f3a8 \u89c6\u89c9\u98ce\u683c</div><div class="style-grid">'+STYLES.map(function(s){return '<div class="style-card'+(s.id===selectedStyle?' selected':'')+'" onclick="pickStyle(\''+s.id+'\',this)"><div class="s-icon">'+s.icon+'</div><div class="s-name">'+s.name+'</div><div class="s-desc">'+s.desc+'</div></div>'}).join('')+'</div></div>';h+='<div style="text-align:right"><button class="btn btn-green btn-lg" id="gen-btn" onclick="doGen()">\U0001f680 \u5f00\u59cb\u751f\u6210</button></div><div id="gen-ld" style="display:none;text-align:center;padding:30px"><span class="spinner"></span> <span style="color:var(--text-2)">\u6b63\u5728\u5206\u6790\u5267\u672c\u3001\u63d0\u53d6\u89d2\u8272\u3001\u751f\u6210\u5206\u6bb5...</span></div>';document.getElementById('content').innerHTML=h;}
function pickStyle(id,el){selectedStyle=id;document.querySelectorAll('.style-card').forEach(function(e){e.classList.remove('selected')});el.classList.add('selected');}
function doGen(){var s=document.getElementById('c-script').value.trim();if(!s){toast('\u8bf7\u8f93\u5165\u5267\u672c\u5185\u5bb9','error');return}var btn=document.getElementById('gen-btn'),ld=document.getElementById('gen-ld');btn.disabled=true;ld.style.display='block';api('/api/projects',{method:'POST',body:JSON.stringify({title:document.getElementById('c-title').value||'\u6211\u7684\u89c6\u9891',content:s,style_preset:selectedStyle,target_duration_sec:parseInt(document.getElementById('c-dur').value)||60})}).then(function(d){toast('\u9879\u76ee\u521b\u5efa\u6210\u529f\uff01');navigate('detail',d)}).catch(function(e){toast('\u751f\u6210\u5931\u8d25: '+e.message,'error')}).then(function(){btn.disabled=false;ld.style.display='none'});}
function switchTab(t){detailTab=t;renderDetail();}
function renderDetail(){
var p=currentProject;if(!p){navigate('home');return}
document.getElementById('h-title').textContent=p.name;
document.getElementById('h-actions').innerHTML='<button class="btn btn-outline btn-sm" onclick="navigate(\'home\')">\u2190 \u8fd4\u56de\u5217\u8868</button><button class="btn btn-outline btn-sm" onclick="toast(\'\u5bfc\u51fa\u529f\u80fd\u5f00\u53d1\u4e2d\')">\U0001f4e6 \u5bfc\u51fa</button>';
var tabs=[{id:'overview',l:'\U0001f4ca \u6982\u89c8'},{id:'characters',l:'\U0001f3ad \u89d2\u8272'},{id:'scenes',l:'\U0001f3de\ufe0f \u573a\u666f'},{id:'style',l:'\U0001f3a8 \u98ce\u683c'},{id:'segments',l:'\U0001f3ac \u5206\u6bb5\u8ba1\u5212'}];
var h='<div class="detail-tabs">'+tabs.map(function(t){return '<div class="detail-tab'+(t.id===detailTab?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.l+'</div>'}).join('')+'</div>';

h+='<div class="d-panel'+(detailTab==='overview'?' active':'')+'">';
h+='<div class="stats-row">';
h+='<div class="stat-card"><div class="num">'+p.characters.length+'</div><div class="label">\u89d2\u8272</div></div>';
h+='<div class="stat-card"><div class="num">'+p.scenes.length+'</div><div class="label">\u573a\u666f</div></div>';
h+='<div class="stat-card"><div class="num">'+p.segment_count+'</div><div class="label">\u89c6\u9891\u5206\u6bb5</div></div>';
h+='<div class="stat-card"><div class="num">'+(p.script.estimated_duration_sec||0)+'s</div><div class="label">\u9884\u4f30\u65f6\u957f</div></div>';
h+='<div class="stat-card"><div class="num">'+(p.script.language==='zh'?'\u4e2d\u6587':'EN')+'</div><div class="label">\u8bed\u8a00</div></div>';
h+='<div class="stat-card"><div class="num">'+p.current_stage+'/6</div><div class="label">\u5f53\u524d\u9636\u6bb5</div></div>';
h+='</div></div>';

h+='<div class="d-panel'+(detailTab==='characters'?' active':'')+'">';
if(p.characters.length){p.characters.forEach(function(c){h+='<div class="char-item"><div class="c-name">\U0001f3ad '+esc(c.name)+(c.age_range?' <span style="color:var(--text-2);font-size:12px">('+esc(c.age_range)+')</span>':'')+'</div><div class="c-desc">'+esc(c.description)+'</div><div>'+(c.appearance_keywords||[]).map(function(k){return '<span class="tag accent">'+esc(k)+'</span>'}).join('')+'</div></div>'})}else{h+='<div style="color:var(--text-3);padding:20px">\u672a\u63d0\u53d6\u5230\u89d2\u8272</div>'}
h+='</div>';

h+='<div class="d-panel'+(detailTab==='scenes'?' active':'')+'">';
if(p.scenes.length){p.scenes.forEach(function(s){h+='<div class="scene-item"><div class="sc-name">\U0001f3de\ufe0f '+esc(s.name)+' <span class="tag">'+esc(s.time_of_day)+'</span> <span class="tag">'+esc(s.mood)+'</span></div><div class="sc-desc">'+esc(s.description)+'</div><div>'+(s.environment_keywords||[]).map(function(k){return '<span class="tag accent">'+esc(k)+'</span>'}).join('')+'</div></div>'})}else{h+='<div style="color:var(--text-3);padding:20px">\u672a\u63d0\u53d6\u5230\u573a\u666f</div>'}
h+='</div>';

h+='<div class="d-panel'+(detailTab==='style'?' active':'')+'">';
if(p.style){h+='<div class="card"><div class="card-title">\U0001f3a8 '+esc(p.style.name)+'</div><p style="color:var(--text-2);margin-bottom:12px">'+esc(p.style.description)+'</p><div>'+(p.style.visual_keywords||[]).map(function(k){return '<span class="tag accent">'+esc(k)+'</span>'}).join('')+'</div></div>'}else{h+='<div style="color:var(--text-3);padding:20px">\u672a\u8bbe\u7f6e\u98ce\u683c</div>'}
h+='</div>';

h+='<div class="d-panel'+(detailTab==='segments'?' active':'')+'">';
h+='<p style="font-size:13px;color:var(--text-2);margin-bottom:12px">\u6bcf\u4e2a\u5206\u6bb5\u5c06\u5e26\u7740\u4e00\u81f4\u6027\u5173\u952e\u8bcd\uff08\u89d2\u8272+\u73af\u5883+\u98ce\u683c\uff09\u8c03\u7528\u89c6\u9891 AI \u751f\u6210</p>';
if(p.segments&&p.segments.length){p.segments.forEach(function(s){
h+='<div class="seg-item"><div class="seq-badge">'+(s.sequence+1)+'</div>';
h+='<div class="seg-meta">\u23f1 '+s.duration_sec+'s \u00b7 \U0001f3a5 '+esc(s.camera_motion)+' \u00b7 '+(s.status==='pending'?'\u23f3 \u5f85\u751f\u6210':'\u2705 '+esc(s.status))+'</div>';
h+='<div>'+(s.character_keywords||[]).map(function(k){return '<span class="tag">'+esc(k)+'</span>'}).join('')+'</div>';
h+='<div>'+(s.environment_keywords||[]).map(function(k){return '<span class="tag accent">'+esc(k)+'</span>'}).join('')+'</div>';
h+='<div>'+(s.style_keywords||[]).map(function(k){return '<span class="tag" style="border-color:var(--purple);color:var(--purple)">'+esc(k)+'</span>'}).join('')+'</div>';
h+='<div class="seg-prompt">'+esc(s.visual_prompt)+'</div></div>'})}else{h+='<div style="color:var(--text-3);padding:20px">\u65e0\u5206\u6bb5</div>'}
h+='</div>';

document.getElementById('content').innerHTML=h;}

/* Init */
updCfgSt();
navigate('home');
</script>
</body>
</html>
